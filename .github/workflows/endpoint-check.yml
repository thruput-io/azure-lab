name: 'Event Hub Endpoint Check'

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  endpoint-check:
    name: 'Event Hub Endpoint Check'
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: ./terraform

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Azure Login
      uses: azure/login@v3
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_wrapper: false

    - name: Terraform Init
      run: terraform init -input=false
      env:
        ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        ARM_USE_OIDC: true

    - name: Resolve credentials from Key Vault
      id: creds
      run: |
        set -euo pipefail
        BOOTSTRAP=$(terraform output -raw kafka_bootstrap_server)
        DOMAIN=$(echo "$BOOTSTRAP" | cut -d: -f1)
        if [ -z "$DOMAIN" ]; then
          echo "ERROR: Failed to resolve domain from terraform output kafka_bootstrap_server"
          exit 1
        fi
        KV_NAME=$(terraform output -raw key_vault_name)
        CLIENT_PROPS=$(az keyvault secret show \
          --vault-name "$KV_NAME" \
          --name kafka-client-properties \
          --query value -o tsv)
        PROPS_FILE="/tmp/client.properties"
        printf '%s\n' "$CLIENT_PROPS" > "$PROPS_FILE"
        sed -i 's/\r$//' "$PROPS_FILE"
        if [ ! -s "$PROPS_FILE" ]; then
          echo "ERROR: Retrieved kafka-client-properties is empty"
          exit 1
        fi
        if ! grep -q '^bootstrap.servers=' "$PROPS_FILE"; then
          echo "ERROR: client.properties is missing bootstrap.servers"
          exit 1
        fi
        echo "domain=$DOMAIN"         >> $GITHUB_OUTPUT
        echo "props_file=$PROPS_FILE" >> $GITHUB_OUTPUT
      env:
        ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        ARM_USE_OIDC: true

    # ---------------------------------------------------------------
    # Check 1: TLS certificate valid and trusted on :443
    # ---------------------------------------------------------------
    - name: 'Check 1 — TLS certificate valid and trusted'
      run: |
        set -euo pipefail
        echo "==> Verifying TLS certificate for ${DOMAIN}:443 ..."
        CERT_RESULT=$(echo | openssl s_client -connect "${DOMAIN}:443" -servername "$DOMAIN" 2>/dev/null)
        if ! echo "$CERT_RESULT" | grep -q "Verify return code: 0 (ok)"; then
          VERIFY_CODE=$(echo "$CERT_RESULT" | grep "Verify return code:" || echo "(not found)")
          echo "FAIL: TLS certificate verification failed — $VERIFY_CODE"
          exit 1
        fi
        CERT_CN=$(echo "$CERT_RESULT" | openssl x509 -noout -subject 2>/dev/null | sed 's/.*CN *= *//')
        EXPIRY=$(echo "$CERT_RESULT" | openssl x509 -noout -enddate 2>/dev/null | cut -d= -f2)
        EXPIRY_EPOCH=$(date -d "$EXPIRY" +%s 2>/dev/null || date -j -f "%b %d %T %Y %Z" "$EXPIRY" +%s 2>/dev/null)
        NOW_EPOCH=$(date +%s)
        DAYS_LEFT=$(( (EXPIRY_EPOCH - NOW_EPOCH) / 86400 ))
        echo "Certificate CN: $CERT_CN  |  Expires: $EXPIRY  |  Days left: $DAYS_LEFT"
        if [ "$DAYS_LEFT" -lt 7 ]; then
          echo "FAIL: Certificate expires in $DAYS_LEFT days — renew immediately"
          exit 1
        fi
        echo "PASS: TLS certificate is valid, trusted, and expires in $DAYS_LEFT days"
      env:
        DOMAIN: ${{ steps.creds.outputs.domain }}

    # ---------------------------------------------------------------
    # Check 2: Kafka broker reachable on port 9093 via App Gateway (TCP)
    # ---------------------------------------------------------------
    - name: 'Check 2 — Kafka broker TCP reachable via App Gateway (:9093)'
      run: |
        set -euo pipefail
        echo "==> Checking TCP connectivity to ${DOMAIN}:9093 ..."
        if ! timeout 10 bash -c "echo > /dev/tcp/$DOMAIN/9093" 2>/dev/null; then
          echo "FAIL: Cannot reach ${DOMAIN}:9093 — check DNS and App Gateway firewall"
          exit 1
        fi
        echo "PASS: ${DOMAIN}:9093 is reachable"
      env:
        DOMAIN: ${{ steps.creds.outputs.domain }}

    # ---------------------------------------------------------------
    # Check 3: Kafka produce + consume via SASL/OAUTHBEARER (Event Hubs)
    # Uses the kafka-clients jar bundled in the Confluent CLI Docker image
    # to send one record and read it back from the orders.placed topic.
    # ---------------------------------------------------------------
    - name: 'Check 3 — Kafka produce + consume (SASL/OAUTHBEARER)'
      run: |
        set -euo pipefail
        PROPS_FILE="${{ steps.creds.outputs.props_file }}"
        TOPIC=$(grep '^topic=' "$PROPS_FILE" | cut -d= -f2- | tr -d ' \r\n')
        DOMAIN="${{ steps.creds.outputs.domain }}"

        echo "==> Installing kcat (kafkacat) ..."
        sudo apt-get install -y kcat >/dev/null 2>&1

        PAYLOAD="{\"check\":\"endpoint-check\",\"ts\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"
        echo "==> Producing test message to topic '${TOPIC}' ..."
        echo "$PAYLOAD" | kcat \
          -P \
          -b "${DOMAIN}:9093" \
          -t "$TOPIC" \
          -X security.protocol=SASL_SSL \
          -X sasl.mechanism=OAUTHBEARER \
          -X sasl.oauthbearer.config="$(grep '^sasl.jaas.config=' "$PROPS_FILE" | cut -d= -f2-)" \
          -X sasl.oauthbearer.token.endpoint.url="$(grep '^sasl.oauthbearer.token.endpoint.url=' "$PROPS_FILE" | cut -d= -f2-)" \
          -X enable.ssl.certificate.verification=true
        echo "PASS: Message produced successfully"

        echo "==> Consuming one message from topic '${TOPIC}' (last offset, timeout 30s) ..."
        CONSUMED=$(kcat \
          -C \
          -b "${DOMAIN}:9093" \
          -t "$TOPIC" \
          -o -1 \
          -c 1 \
          -e \
          -X security.protocol=SASL_SSL \
          -X sasl.mechanism=OAUTHBEARER \
          -X sasl.oauthbearer.config="$(grep '^sasl.jaas.config=' "$PROPS_FILE" | cut -d= -f2-)" \
          -X sasl.oauthbearer.token.endpoint.url="$(grep '^sasl.oauthbearer.token.endpoint.url=' "$PROPS_FILE" | cut -d= -f2-)" \
          -X enable.ssl.certificate.verification=true \
          -X session.timeout.ms=30000 2>/dev/null || true)
        if [ -z "$CONSUMED" ]; then
          echo "FAIL: No message consumed from topic '${TOPIC}'"
          exit 1
        fi
        echo "Consumed: $CONSUMED"
        echo "PASS: Produce + consume round-trip successful"

    # ---------------------------------------------------------------
    # Summary
    # ---------------------------------------------------------------
    - name: Summary
      if: always()
      run: |
        printf '%s\n' "### Event Hub Endpoint Check Results" >> $GITHUB_STEP_SUMMARY
        printf '%s\n' "" >> $GITHUB_STEP_SUMMARY
        printf '%s\n' "| Check | Target |" >> $GITHUB_STEP_SUMMARY
        printf '%s\n' "|---|---|" >> $GITHUB_STEP_SUMMARY
        printf '%s\n' "| TLS Certificate | \`${{ steps.creds.outputs.domain }}:443\` |" >> $GITHUB_STEP_SUMMARY
        printf '%s\n' "| Kafka TCP reachability | \`${{ steps.creds.outputs.domain }}:9093\` |" >> $GITHUB_STEP_SUMMARY
        printf '%s\n' "| Kafka produce + consume (OAUTHBEARER) | topic \`orders.placed\` |" >> $GITHUB_STEP_SUMMARY
