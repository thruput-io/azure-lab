name: 'Confluent Endpoint Check'

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  confluent-check:
    name: 'Confluent Endpoint Check'
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: ./terraform

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Azure Login
      uses: azure/login@v3
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_wrapper: false

    - name: Terraform Init
      run: terraform init
      env:
        ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        ARM_USE_OIDC: true

    - name: Resolve client.properties from Key Vault
      id: creds
      run: |
        BOOTSTRAP=$(terraform output -raw kafka_bootstrap_server)
        DOMAIN=$(echo "$BOOTSTRAP" | cut -d: -f1)

        if [ -z "$DOMAIN" ]; then
          echo "ERROR: Failed to resolve domain from terraform output kafka_bootstrap_server"
          exit 1
        fi

        KV_NAME=$(terraform output -raw key_vault_name)
        CLIENT_PROPS=$(az keyvault secret show \
          --vault-name "$KV_NAME" \
          --name kafka-client-properties \
          --query value -o tsv)

        PROPS_FILE="/tmp/client.properties"
        printf '%s\n' "$CLIENT_PROPS" > "$PROPS_FILE"
        sed -i 's/\r$//' "$PROPS_FILE"

        if [ ! -s "$PROPS_FILE" ]; then
          echo "ERROR: Retrieved kafka-client-properties is empty"
          exit 1
        fi

        if ! grep -q '^bootstrap.servers=' "$PROPS_FILE"; then
          echo "ERROR: client.properties is missing bootstrap.servers"
          exit 1
        fi

        SR_URL=$(terraform output -raw schema_registry_url)
        echo "domain=$DOMAIN"           >> $GITHUB_OUTPUT
        echo "props_file=$PROPS_FILE"   >> $GITHUB_OUTPUT
        echo "sr_url=$SR_URL"           >> $GITHUB_OUTPUT
      env:
        TF_VAR_pfx_base64: ${{ secrets.PFX_BASE64 }}
        TF_VAR_pfx_password: ${{ secrets.PFX_PASSWORD }}
        ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        ARM_USE_OIDC: true

    # ---------------------------------------------------------------
    # Check 0: TLS certificate valid and trusted
    # Explicit cert validation before any functional checks
    # ---------------------------------------------------------------
    - name: 'Check 0 — TLS certificate valid and trusted'
      run: |
        echo "==> Verifying TLS certificate for $DOMAIN ..."
        CERT_RESULT=$(echo | openssl s_client -connect "${DOMAIN}:443" -servername "$DOMAIN" 2>/dev/null)

        if ! echo "$CERT_RESULT" | grep -q "Verify return code: 0 (ok)"; then
          VERIFY_CODE=$(echo "$CERT_RESULT" | grep "Verify return code:" || echo "(not found)")
          echo "FAIL: TLS certificate verification failed — $VERIFY_CODE"
          exit 1
        fi

        CERT_CN=$(echo "$CERT_RESULT" | openssl x509 -noout -subject 2>/dev/null | sed 's/.*CN *= *//')
        echo "Certificate CN: $CERT_CN"

        EXPIRY=$(echo "$CERT_RESULT" | openssl x509 -noout -enddate 2>/dev/null | cut -d= -f2)
        echo "Certificate expires: $EXPIRY"
        EXPIRY_EPOCH=$(date -d "$EXPIRY" +%s 2>/dev/null || date -j -f "%b %d %T %Y %Z" "$EXPIRY" +%s 2>/dev/null)
        NOW_EPOCH=$(date +%s)
        DAYS_LEFT=$(( (EXPIRY_EPOCH - NOW_EPOCH) / 86400 ))
        echo "Days until expiry: $DAYS_LEFT"
        if [ "$DAYS_LEFT" -lt 7 ]; then
          echo "FAIL: Certificate expires in $DAYS_LEFT days — renew immediately"
          exit 1
        fi

        echo "PASS: TLS certificate is valid, trusted, and expires in $DAYS_LEFT days"
      env:
        DOMAIN: ${{ steps.creds.outputs.domain }}

    # ---------------------------------------------------------------
    # Check 1: Schema Registry reachable — Confluent /subjects endpoint
    # Auth: Entra ID Bearer token (scope=eventhubs.azure.net/.default)
    # ---------------------------------------------------------------
    - name: 'Check 1 — Schema Registry reachable (Confluent /subjects endpoint)'
      run: |
        PROPS_FILE="${{ steps.creds.outputs.props_file }}"
        ISSUER_URL=$(grep '^bearer.auth.issuer.endpoint.url=' "$PROPS_FILE" | cut -d= -f2- | tr -d ' \r\n')
        CLIENT_ID=$(grep '^bearer.auth.client.id=' "$PROPS_FILE" | cut -d= -f2- | tr -d ' \r\n')
        CLIENT_SECRET=$(grep '^bearer.auth.client.secret=' "$PROPS_FILE" | cut -d= -f2- | tr -d ' \r\n')
        SCOPE=$(grep '^bearer.auth.scope=' "$PROPS_FILE" | cut -d= -f2- | tr -d ' \r\n')
        SR_URL="${{ steps.creds.outputs.sr_url }}"

        echo "::add-mask::$CLIENT_SECRET"

        echo "==> Getting OAuth token from Entra ID..."
        ACCESS_TOKEN=$(curl -sS -X POST "$ISSUER_URL" \
          -d "grant_type=client_credentials&client_id=${CLIENT_ID}&client_secret=${CLIENT_SECRET}&scope=${SCOPE}" \
          | jq -r '.access_token')
        echo "::add-mask::$ACCESS_TOKEN"

        if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
          echo "FAIL: Could not acquire OAuth token"
          exit 1
        fi
        echo "Token acquired (length=${#ACCESS_TOKEN})"

        echo "==> Checking Confluent SR endpoint at ${SR_URL}/subjects ..."
        HTTP_STATUS=$(curl -sS -o /tmp/sr_response.json -w "%{http_code}" \
          -H "Authorization: Bearer $ACCESS_TOKEN" \
          "${SR_URL}/subjects")

        echo "HTTP status: $HTTP_STATUS"
        cat /tmp/sr_response.json
        if [ "$HTTP_STATUS" != "200" ]; then
          echo "FAIL: Schema Registry /subjects returned $HTTP_STATUS (expected 200)"
          exit 1
        fi
        echo "PASS: Schema Registry is reachable (Confluent /subjects endpoint)"

    # ---------------------------------------------------------------
    # Check 2: Avro schema subject exists (Confluent /subjects endpoint)
    # TopicNameStrategy: subject = orders.placed-value
    # ---------------------------------------------------------------
    - name: 'Check 2 — Avro schema subject exists (orders.placed-value)'
      run: |
        PROPS_FILE="${{ steps.creds.outputs.props_file }}"
        ISSUER_URL=$(grep '^bearer.auth.issuer.endpoint.url=' "$PROPS_FILE" | cut -d= -f2- | tr -d ' \r\n')
        CLIENT_ID=$(grep '^bearer.auth.client.id=' "$PROPS_FILE" | cut -d= -f2- | tr -d ' \r\n')
        CLIENT_SECRET=$(grep '^bearer.auth.client.secret=' "$PROPS_FILE" | cut -d= -f2- | tr -d ' \r\n')
        SCOPE=$(grep '^bearer.auth.scope=' "$PROPS_FILE" | cut -d= -f2- | tr -d ' \r\n')
        TOPIC=$(grep '^topic=' "$PROPS_FILE" | cut -d= -f2- | tr -d ' \r\n')
        SR_URL="${{ steps.creds.outputs.sr_url }}"
        SUBJECT="${TOPIC}-value"

        echo "::add-mask::$CLIENT_SECRET"

        ACCESS_TOKEN=$(curl -sS -X POST "$ISSUER_URL" \
          -d "grant_type=client_credentials&client_id=${CLIENT_ID}&client_secret=${CLIENT_SECRET}&scope=${SCOPE}" \
          | jq -r '.access_token')
        echo "::add-mask::$ACCESS_TOKEN"

        echo "==> Checking subject ${SUBJECT} at ${SR_URL}/subjects/${SUBJECT}/versions/latest ..."
        HTTP_STATUS=$(curl -sS -o /tmp/subj_response.json -w "%{http_code}" \
          -H "Authorization: Bearer $ACCESS_TOKEN" \
          "${SR_URL}/subjects/${SUBJECT}/versions/latest")

        echo "HTTP status: $HTTP_STATUS"
        cat /tmp/subj_response.json
        if [ "$HTTP_STATUS" != "200" ]; then
          echo "FAIL: Subject ${SUBJECT} not found (HTTP $HTTP_STATUS) — schema may not be registered yet"
          exit 1
        fi
        echo "PASS: Avro schema subject ${SUBJECT} exists"

    # ---------------------------------------------------------------
    # Check 3: Kafka broker reachable on port 9093 via App Gateway (TCP)
    # ---------------------------------------------------------------
    - name: 'Check 3 — Kafka broker TCP reachable via App Gateway (:9093)'
      run: |
        echo "==> Checking TCP connectivity to $DOMAIN:9093 ..."
        if ! timeout 10 bash -c "echo > /dev/tcp/$DOMAIN/9093" 2>/dev/null; then
          echo "FAIL: Cannot reach $DOMAIN:9093 — check DNS and App Gateway firewall"
          exit 1
        fi
        echo "PASS: $DOMAIN:9093 is reachable"
      env:
        DOMAIN: ${{ steps.creds.outputs.domain }}

    # ---------------------------------------------------------------
    # Check 4: Full Confluent Avro produce + consume via App Gateway
    # Uses confluentinc/cp-schema-registry:7.6.0 (kafka-avro-console-producer/consumer)
    # Broker: App Gateway port 9093 (SASL/OAUTHBEARER)
    # Schema Registry: EH namespace Confluent-compatible endpoint (Bearer auth)
    # ---------------------------------------------------------------
    - name: 'Check 4 — Produce + Consume Avro message (Confluent standard serializer)'
      run: |
        PROPS_FILE="${{ steps.creds.outputs.props_file }}"
        echo "==> Running Confluent Avro smoke test..."
        bash ../scripts/confluent-produce-consume-check.sh \
          --props-file "$PROPS_FILE"

    - name: Summary
      if: always()
      run: |
        printf '%s\n' "### Confluent Endpoint Check Results" >> $GITHUB_STEP_SUMMARY
        printf '%s\n' "" >> $GITHUB_STEP_SUMMARY
        printf '%s\n' "| Check | Endpoint |" >> $GITHUB_STEP_SUMMARY
        printf '%s\n' "|---|---|" >> $GITHUB_STEP_SUMMARY
        printf '%s\n' "| TLS Certificate (App GW) | \`${{ steps.creds.outputs.domain }}:443\` |" >> $GITHUB_STEP_SUMMARY
        printf '%s\n' "| Schema Registry (Confluent /subjects) | \`${{ steps.creds.outputs.sr_url }}/subjects\` |" >> $GITHUB_STEP_SUMMARY
        printf '%s\n' "| Avro schema subject | \`orders.placed-value\` |" >> $GITHUB_STEP_SUMMARY
        printf '%s\n' "| Kafka broker (TCP via App GW) | \`${{ steps.creds.outputs.domain }}:9093\` |" >> $GITHUB_STEP_SUMMARY
        printf '%s\n' "| Produce + Consume (Confluent Avro) | topic \`orders.placed\` |" >> $GITHUB_STEP_SUMMARY
