name: 'Download client.properties'

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  download:
    name: 'Download client.properties from Key Vault'
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: ./terraform

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Azure Login
      uses: azure/login@v3
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_wrapper: false

    - name: Terraform Init
      run: terraform init
      env:
        ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        ARM_USE_OIDC: true

    - name: Download client.properties from Key Vault
      run: |
        KV_NAME=$(terraform output -raw key_vault_name)
        az keyvault secret show \
          --vault-name "$KV_NAME" \
          --name kafka-client-properties \
          --query value -o tsv > ../client.properties
        echo "client.properties downloaded successfully"
      env:
        TF_VAR_custom_domain_name: "placeholder"
        TF_VAR_pfx_base64: ${{ secrets.PFX_BASE64 }}
        TF_VAR_pfx_password: ${{ secrets.PFX_PASSWORD }}
        ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        ARM_USE_OIDC: true

    - name: Upload client.properties as artifact
      uses: actions/upload-artifact@v4
      with:
        name: client-properties
        path: client.properties
        retention-days: 10
