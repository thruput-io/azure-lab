name: 'Download client.properties'

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  download:
    name: 'Download client.properties from Key Vault'
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Azure Login
      uses: azure/login@v3
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Download client.properties from Key Vault
      run: |
        az keyvault secret show \
          --vault-name "${{ vars.KEY_VAULT_NAME }}" \
          --name kafka-client-properties \
          --query value -o json | jq -r . > client.properties
        echo "client.properties downloaded successfully"
      env:
        ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        ARM_USE_OIDC: true

    - name: Upload client.properties as artifact
      uses: actions/upload-artifact@v4
      with:
        name: client-properties
        path: client.properties
        retention-days: 10
