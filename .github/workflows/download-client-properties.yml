name: 'Download client.properties'

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  download:
    name: 'Download client.properties'
    runs-on: ubuntu-latest

    steps:
    - name: Write client.properties from secret
      run: |
        set -euo pipefail
        printf '%s' "${{ secrets.KAFKA_CLIENT_PROPERTIES }}" > client.properties

        if [ ! -s client.properties ]; then
          echo "ERROR: KAFKA_CLIENT_PROPERTIES secret is empty."
          exit 1
        fi

        if ! grep -q '^bootstrap\.servers=' client.properties; then
          echo "ERROR: client.properties missing required bootstrap.servers entry."
          exit 1
        fi

        echo "client.properties validated successfully"

    - name: Upload client.properties as artifact
      uses: actions/upload-artifact@v4
      with:
        name: client-properties
        path: client.properties
        retention-days: 10
