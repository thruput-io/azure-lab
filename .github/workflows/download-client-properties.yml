name: 'Download client.properties'

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  download:
    name: 'Download client.properties from Key Vault'
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Azure Login
      uses: azure/login@v3
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_wrapper: false

    - name: Terraform Init
      run: terraform init -input=false
      working-directory: ./terraform
      env:
        ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        ARM_USE_OIDC: true

    - name: Resolve Key Vault Name
      run: |
        set -euo pipefail
        KV_NAME="$(terraform output -raw key_vault_name)"
        if [ -z "$KV_NAME" ]; then
          echo "ERROR: terraform output key_vault_name is empty."
          exit 1
        fi
        echo "KV_NAME=$KV_NAME" >> "$GITHUB_ENV"
      working-directory: ./terraform
      env:
        ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        ARM_USE_OIDC: true

    - name: Download client.properties from Key Vault
      run: |
        set -euo pipefail

        KV_NAME="${KV_NAME}"
        if [ -z "$KV_NAME" ]; then
          echo "ERROR: KV_NAME is empty."
          exit 1
        fi

        SECRET_VALUE="$(az keyvault secret show \
          --vault-name "$KV_NAME" \
          --name kafka-client-properties \
          --query value -o tsv)"

        if [ -z "$SECRET_VALUE" ]; then
          echo "ERROR: Key Vault secret kafka-client-properties is empty."
          exit 1
        fi

        printf '%s' "$SECRET_VALUE" > client.properties

        if [ ! -s client.properties ]; then
          echo "ERROR: client.properties file is empty after retrieval."
          exit 1
        fi

        if ! grep -q '^bootstrap\.servers=' client.properties; then
          echo "ERROR: client.properties missing required bootstrap.servers entry."
          exit 1
        fi

        echo "client.properties downloaded and validated successfully"
      env:
        ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        ARM_USE_OIDC: true

    - name: Upload client.properties as artifact
      uses: actions/upload-artifact@v4
      with:
        name: client-properties
        path: client.properties
        retention-days: 10
