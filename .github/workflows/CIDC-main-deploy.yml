name: 'Terraform Deploy'

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: ./terraform

    steps:
    - name: Checkout
      timeout-minutes: 2
      uses: actions/checkout@v4


    - name: Azure Login
      timeout-minutes: 2
      uses: azure/login@v3
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Setup Terraform
      timeout-minutes: 2
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_wrapper: false

    - name: Bootstrap tfstate storage
      timeout-minutes: 2
      run: |
        set -euo pipefail
        RG=tfstate-rg
        SA=tfstate1776442465
        CONTAINER=tfstate
        LOCATION=eastus
        if ! az group show --name "$RG" >/dev/null 2>&1; then
          az group create --name "$RG" --location "$LOCATION"
        fi
        if ! az storage account show --name "$SA" --resource-group "$RG" >/dev/null 2>&1; then
          az storage account create --name "$SA" --resource-group "$RG" --location "$LOCATION" --sku Standard_LRS --allow-blob-public-access false
        fi
        if ! az storage container show --name "$CONTAINER" --account-name "$SA" --auth-mode login >/dev/null 2>&1; then
          az storage container create --name "$CONTAINER" --account-name "$SA" --auth-mode login
        fi

    - name: Terraform Init
      timeout-minutes: 2
      run: terraform init

    - name: Terraform Plan
      timeout-minutes: 10
      run: terraform plan -no-color -input=false
      env:
        ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        ARM_USE_OIDC: true

    - name: Remove stale App Gateway objects (Confluent SR leftovers)
      timeout-minutes: 2
      if: github.ref == 'refs/heads/main'
      working-directory: ./terraform
      run: |
        set -euo pipefail
        RG="rg-eventhub-appgw-lab"
        GW="appgw-eventhub-lab"

        # Remove stale probe if it exists
        if az network application-gateway probe show -g "$RG" --gateway-name "$GW" --name sr-probe &>/dev/null; then
          echo "Removing stale probe sr-probe..."
          az network application-gateway probe delete -g "$RG" --gateway-name "$GW" --name sr-probe --no-wait false
          echo "Probe removed."
        else
          echo "Probe sr-probe not found, nothing to remove."
        fi

        # Remove stale backend http settings if they exist
        if az network application-gateway http-settings show -g "$RG" --gateway-name "$GW" --name sr-be-htst &>/dev/null; then
          echo "Removing stale backend-http-settings sr-be-htst..."
          az network application-gateway http-settings delete -g "$RG" --gateway-name "$GW" --name sr-be-htst --no-wait false
          echo "Backend settings removed."
        else
          echo "Backend settings sr-be-htst not found, nothing to remove."
        fi
      env:
        ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        ARM_USE_OIDC: true

    - name: Terraform Apply (full)
      timeout-minutes: 30
      if: github.ref == 'refs/heads/main'
      run: |
        set -euo pipefail
        ATTEMPTS=3
        for i in $(seq 1 $ATTEMPTS); do
          echo "Terraform apply attempt $i/$ATTEMPTS"
          if terraform apply -auto-approve -input=false; then
            exit 0
          fi

          if [ "$i" -lt "$ATTEMPTS" ]; then
            echo "Apply failed, waiting 60s for RBAC propagation before retry..."
            sleep 60
          fi
        done

        echo "Terraform apply failed after $ATTEMPTS attempts"
        exit 1
      env:
        ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        ARM_USE_OIDC: true
    - name: Update GitHub secrets from Key Vault
      timeout-minutes: 2
      if: github.ref == 'refs/heads/main'
      run: |
        set -euo pipefail
        KV_NAME="$(terraform output -raw key_vault_name)"
        if [ -z "$KV_NAME" ]; then
          echo "ERROR: terraform output key_vault_name is empty"
          exit 1
        fi
        
        # Update KAFKA_CLIENT_PROPERTIES
        KAFKA_VALUE="$(az keyvault secret show \
          --vault-name "$KV_NAME" \
          --name client-properties \
          --query value -o tsv)"
        if [ -z "$KAFKA_VALUE" ]; then
          echo "ERROR: Key Vault secret client-properties is empty"
          exit 1
        fi
        printf '%s' "$KAFKA_VALUE" | gh secret set KAFKA_CLIENT_PROPERTIES
        echo "KAFKA_CLIENT_PROPERTIES secret updated"

      env:
        GH_TOKEN: ${{ secrets.GH_PAT }}
        ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        ARM_USE_OIDC: true

