name: 'Terraform Deploy'

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  secrets: write

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: ./terraform

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set Domain Name
      run: |
        DOMAIN="${{ vars.CUSTOM_DOMAIN_NAME || secrets.CUSTOM_DOMAIN_NAME }}"
        if [ -z "$DOMAIN" ]; then
          echo "Error: CUSTOM_DOMAIN_NAME is not set in repository variables or secrets"
          exit 1
        fi
        echo "DOMAIN_NAME=$DOMAIN" >> $GITHUB_ENV

    - name: Azure Login
      uses: azure/login@v3
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_wrapper: false

    - name: Terraform Init
      run: terraform init

    - name: Terraform Plan
      run: terraform plan -no-color -input=false
      env:
        TF_VAR_custom_domain_name: ${{ env.DOMAIN_NAME }}
        TF_VAR_pfx_base64: ${{ secrets.PFX_BASE64 }}
        TF_VAR_pfx_password: ${{ secrets.PFX_PASSWORD }}
        ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        ARM_USE_OIDC: true

    - name: Remove stale App Gateway objects (Confluent SR leftovers)
      if: github.ref == 'refs/heads/main'
      working-directory: ./terraform
      run: |
        set -euo pipefail
        RG="rg-eventhub-appgw-lab"
        GW="appgw-eventhub-lab"

        # Remove stale probe if it exists
        if az network application-gateway probe show -g "$RG" --gateway-name "$GW" --name sr-probe &>/dev/null; then
          echo "Removing stale probe sr-probe..."
          az network application-gateway probe delete -g "$RG" --gateway-name "$GW" --name sr-probe --no-wait false
          echo "Probe removed."
        else
          echo "Probe sr-probe not found, nothing to remove."
        fi

        # Remove stale backend http settings if they exist
        if az network application-gateway http-settings show -g "$RG" --gateway-name "$GW" --name sr-be-htst &>/dev/null; then
          echo "Removing stale backend-http-settings sr-be-htst..."
          az network application-gateway http-settings delete -g "$RG" --gateway-name "$GW" --name sr-be-htst --no-wait false
          echo "Backend settings removed."
        else
          echo "Backend settings sr-be-htst not found, nothing to remove."
        fi
      env:
        ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        ARM_USE_OIDC: true

    - name: Terraform Apply
      if: github.ref == 'refs/heads/main'
      run: terraform apply -auto-approve -input=false
      env:
        TF_VAR_custom_domain_name: ${{ env.DOMAIN_NAME }}
        TF_VAR_pfx_base64: ${{ secrets.PFX_BASE64 }}
        TF_VAR_pfx_password: ${{ secrets.PFX_PASSWORD }}
        ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        ARM_USE_OIDC: true

    - name: Update KAFKA_CLIENT_PROPERTIES secret
      if: github.ref == 'refs/heads/main'
      run: |
        set -euo pipefail
        KV_NAME="$(terraform output -raw key_vault_name)"
        if [ -z "$KV_NAME" ]; then
          echo "ERROR: terraform output key_vault_name is empty"
          exit 1
        fi
        SECRET_VALUE="$(az keyvault secret show \
          --vault-name "$KV_NAME" \
          --name kafka-client-properties \
          --query value -o tsv)"
        if [ -z "$SECRET_VALUE" ]; then
          echo "ERROR: Key Vault secret kafka-client-properties is empty"
          exit 1
        fi
        printf '%s' "$SECRET_VALUE" | gh secret set KAFKA_CLIENT_PROPERTIES
        echo "KAFKA_CLIENT_PROPERTIES secret updated in GitHub Actions"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        ARM_USE_OIDC: true

