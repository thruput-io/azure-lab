name: 'Terraform Deploy'

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: ./terraform

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Set Domain Name
      run: |
        DOMAIN="${{ vars.CUSTOM_DOMAIN_NAME || secrets.CUSTOM_DOMAIN_NAME }}"
        if [ -z "$DOMAIN" ]; then echo "Error: CUSTOM_DOMAIN_NAME is not set in Secrets or Variables"; exit 1; fi
        echo "DOMAIN_NAME=$DOMAIN" >> $GITHUB_ENV

    - name: Install acme.sh
      run: curl https://get.acme.sh | sh -s email=${{ secrets.LE_EMAIL }}

    - name: Generate Trusted Certificate (Let's Encrypt via Loopia)
      id: cert_gen
      run: |
        export LOOPIA_User="${{ secrets.LOOPIA_USER }}"
        export LOOPIA_Password="${{ secrets.LOOPIA_PASSWORD }}"
        
        # Issue certificate using DNS challenge with debug enabled
        ~/.acme.sh/acme.sh --issue --dns dns_loopia -d "$DOMAIN_NAME" --debug
        
        # Export to PFX
        PFX_PASS="temporary-password"
        ~/.acme.sh/acme.sh --to-pkcs12 --pkcs12-password "$PFX_PASS" -d "$DOMAIN_NAME"
        
        # Encode to Base64 for Terraform
        # Note: acme.sh uses the domain name in the folder path
        PFX_B64=$(cat ~/.acme.sh/${DOMAIN_NAME}_ecc/${DOMAIN_NAME}.p12 | base64 -w 0)
        echo "::add-mask::$PFX_B64"
        echo "pfx_data=$PFX_B64" >> $GITHUB_OUTPUT
        echo "pfx_pass=$PFX_PASS" >> $GITHUB_OUTPUT

    - name: Azure Login
      uses: azure/login@v1
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2

    - name: Terraform Init
      run: terraform init

    - name: Terraform Plan
      run: terraform plan -no-color -input=false
      env:
        TF_VAR_custom_domain_name: ${{ env.DOMAIN_NAME }}
        TF_VAR_pfx_base64: ${{ steps.cert_gen.outputs.pfx_data }}
        TF_VAR_pfx_password: ${{ steps.cert_gen.outputs.pfx_pass }}
        ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        ARM_USE_OIDC: true

    - name: Terraform Apply
      if: github.ref == 'refs/heads/main'
      run: terraform apply -auto-approve -input=false
      env:
        TF_VAR_custom_domain_name: ${{ env.DOMAIN_NAME }}
        TF_VAR_pfx_base64: ${{ steps.cert_gen.outputs.pfx_data }}
        TF_VAR_pfx_password: ${{ steps.cert_gen.outputs.pfx_pass }}
        ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        ARM_USE_OIDC: true
