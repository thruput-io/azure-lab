name: 'Kafka Tests'

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  kafka-tests:
    name: 'Kafka Tests'
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Azure Login
      uses: azure/login@v3
      env:
        AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    # ---------------------------------------------------------------
    # Download client.properties from Key Vault.
    # All values (bootstrap, topics, OAuth) come from this file.
    # No Terraform required — KV is looked up by resource group.
    # ---------------------------------------------------------------
    - name: Load client.properties
      id: creds
      run: |
        set -euo pipefail
        KV_NAME=$(az keyvault list \
          --resource-group rg-eventhub-appgw-lab \
          --query "[0].name" -o tsv)
        if [ -z "$KV_NAME" ]; then
          echo "ERROR: Could not find a Key Vault in rg-eventhub-appgw-lab"
          exit 1
        fi
        echo "Using Key Vault: $KV_NAME"

        PROPS_FILE="/tmp/client.properties"
        az keyvault secret show \
          --vault-name "$KV_NAME" \
          --name kafka-client-properties \
          --query value -o tsv > "$PROPS_FILE"
        sed -i 's/\r$//' "$PROPS_FILE"

        if [ ! -s "$PROPS_FILE" ]; then
          echo "ERROR: client.properties downloaded from Key Vault is empty"
          exit 1
        fi
        if ! grep -q '^bootstrap.servers=' "$PROPS_FILE"; then
          echo "ERROR: client.properties is missing bootstrap.servers"
          exit 1
        fi
        if ! grep -q '^checks_topic=' "$PROPS_FILE"; then
          echo "ERROR: client.properties is missing checks_topic"
          exit 1
        fi

        BOOTSTRAP=$(grep '^bootstrap.servers=' "$PROPS_FILE" | cut -d= -f2-)
        DOMAIN=$(echo "$BOOTSTRAP" | cut -d: -f1)
        CHECKS_TOPIC=$(grep '^checks_topic=' "$PROPS_FILE" | cut -d= -f2-)

        echo "domain=$DOMAIN"             >> $GITHUB_OUTPUT
        echo "bootstrap=$BOOTSTRAP"       >> $GITHUB_OUTPUT
        echo "props_file=$PROPS_FILE"     >> $GITHUB_OUTPUT
        echo "checks_topic=$CHECKS_TOPIC" >> $GITHUB_OUTPUT
        echo "Loaded: bootstrap=$BOOTSTRAP  checks_topic=$CHECKS_TOPIC"

    # ---------------------------------------------------------------
    # Check 1 — Connectivity + SSL
    # TLS handshake on :443 (HTTPS) and :9093 (Kafka)
    # ---------------------------------------------------------------
    - name: 'Check 1 — Connectivity + SSL'
      id: check1
      run: |
        set -euo pipefail
        DOMAIN="${{ steps.creds.outputs.domain }}"

        echo "==> [1a] TLS certificate on ${DOMAIN}:443 ..."
        CERT_RESULT=$(echo | openssl s_client -connect "${DOMAIN}:443" -servername "$DOMAIN" 2>/dev/null)
        if ! echo "$CERT_RESULT" | grep -q "Verify return code: 0 (ok)"; then
          echo "FAIL: TLS certificate verification failed on :443"
          exit 1
        fi
        EXPIRY=$(echo "$CERT_RESULT" | openssl x509 -noout -enddate 2>/dev/null | cut -d= -f2)
        EXPIRY_EPOCH=$(date -d "$EXPIRY" +%s)
        DAYS_LEFT=$(( (EXPIRY_EPOCH - $(date +%s)) / 86400 ))
        echo "  Certificate expires in $DAYS_LEFT days ($EXPIRY)"
        if [ "$DAYS_LEFT" -lt 7 ]; then
          echo "FAIL: Certificate expires in $DAYS_LEFT days — renew immediately"
          exit 1
        fi
        echo "PASS: :443 TLS certificate valid ($DAYS_LEFT days remaining)"

        echo "==> [1b] TLS handshake on ${DOMAIN}:9093 (Kafka) ..."
        if ! echo | openssl s_client -connect "${DOMAIN}:9093" -servername "$DOMAIN" 2>/dev/null \
            | grep -q "Verify return code: 0 (ok)"; then
          echo "FAIL: TLS certificate verification failed on :9093"
          exit 1
        fi
        echo "PASS: :9093 TLS handshake successful"

    # ---------------------------------------------------------------
    # Check 2 — Authentication (SASL/OAUTHBEARER)
    # Uses official confluentinc/cp-kafka image: kafka-topics --list
    # ---------------------------------------------------------------
    - name: 'Check 2 — Authentication (SASL/OAUTHBEARER)'
      id: check2
      run: |
        set -euo pipefail
        echo "==> Authenticating with Kafka broker via SASL/OAUTHBEARER ..."
        docker run --rm \
          -v /tmp/client.properties:/tmp/client.properties \
          confluentinc/cp-kafka:7.9.0 \
          kafka-topics \
            --bootstrap-server "${{ steps.creds.outputs.bootstrap }}" \
            --list \
            --command-config /tmp/client.properties
        echo "PASS: Kafka auth OK (topic list succeeded)"

    # ---------------------------------------------------------------
    # Check 3 — Produce + Consume (checks.kafka topic)
    # Uses official confluentinc/cp-kafka image:
    #   kafka-console-producer and kafka-console-consumer
    # ---------------------------------------------------------------
    - name: 'Check 3 — Produce + Consume (checks.kafka)'
      id: check3
      run: |
        set -euo pipefail
        BOOTSTRAP="${{ steps.creds.outputs.bootstrap }}"
        TOPIC="${{ steps.creds.outputs.checks_topic }}"
        MSG='{"check":"kafka-tests","ts":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}'

        echo "==> Producing message to '$TOPIC' ..."
        echo "$MSG" | docker run -i --rm \
          -v /tmp/client.properties:/tmp/client.properties \
          confluentinc/cp-kafka:7.9.0 \
          kafka-console-producer \
            --bootstrap-server "$BOOTSTRAP" \
            --topic "$TOPIC" \
            --producer.config /tmp/client.properties
        echo "PASS: Message produced to '$TOPIC'"

        echo "==> Consuming message from '$TOPIC' (timeout 45s) ..."
        CONSUMED=$(docker run --rm \
          -v /tmp/client.properties:/tmp/client.properties \
          confluentinc/cp-kafka:7.9.0 \
          kafka-console-consumer \
            --bootstrap-server "$BOOTSTRAP" \
            --topic "$TOPIC" \
            --consumer.config /tmp/client.properties \
            --from-beginning \
            --max-messages 1 \
            --timeout-ms 45000 2>/dev/null || true)
        if [ -z "$CONSUMED" ]; then
          echo "FAIL: No message consumed from '$TOPIC' within timeout"
          exit 1
        fi
        echo "Consumed: $CONSUMED"
        echo "PASS: Produce + consume round-trip on '$TOPIC' successful"

    # ---------------------------------------------------------------
    # Summary
    # ---------------------------------------------------------------
    - name: Summary
      if: always()
      run: |
        printf '%s\n' "### Kafka Tests Results" >> $GITHUB_STEP_SUMMARY
        printf '%s\n' "" >> $GITHUB_STEP_SUMMARY
        printf '%s\n' "| # | Check | Target |" >> $GITHUB_STEP_SUMMARY
        printf '%s\n' "|---|---|---|" >> $GITHUB_STEP_SUMMARY
        printf '%s\n' "| 1 | Connectivity + SSL | \`:443\` TLS cert + \`:9093\` TLS handshake |" >> $GITHUB_STEP_SUMMARY
        printf '%s\n' "| 2 | Authentication | \`kafka-topics --list\` via \`confluentinc/cp-kafka\` + SASL/OAUTHBEARER |" >> $GITHUB_STEP_SUMMARY
        printf '%s\n' "| 3 | Produce + Consume | topic \`${{ steps.creds.outputs.checks_topic }}\` via \`confluentinc/cp-kafka\` |" >> $GITHUB_STEP_SUMMARY
