name: 'PR Terraform Plan'

on:
  pull_request:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read

jobs:
  terraform-plan:
    name: 'Terraform Plan + OAuth contract'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./terraform

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Verify Secrets
      run: |
        if [ -z "${{ secrets.PFX_BASE64 }}" ]; then echo "Error: PFX_BASE64 secret is missing"; exit 1; fi
        if [ -z "${{ secrets.PFX_PASSWORD }}" ]; then echo "Error: PFX_PASSWORD secret is missing"; exit 1; fi
        if [ -z "${{ vars.CUSTOM_DOMAIN_NAME }}" ] && [ -z "${{ secrets.CUSTOM_DOMAIN_NAME }}" ]; then echo "Error: CUSTOM_DOMAIN_NAME is missing"; exit 1; fi

    - name: Set Domain Name
      run: |
        DOMAIN="${{ vars.CUSTOM_DOMAIN_NAME || secrets.CUSTOM_DOMAIN_NAME }}"
        echo "DOMAIN_NAME=$DOMAIN" >> $GITHUB_ENV

    - name: Azure Login
      uses: azure/login@v1
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2

    - name: Terraform Init
      run: terraform init -input=false

    - name: Terraform Plan
      run: terraform plan -no-color -input=false
      env:
        TF_VAR_custom_domain_name: ${{ env.DOMAIN_NAME }}
        TF_VAR_pfx_base64: ${{ secrets.PFX_BASE64 }}
        TF_VAR_pfx_password: ${{ secrets.PFX_PASSWORD }}
        ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        ARM_USE_OIDC: true

    - name: OAuth client.properties contract check
      run: |
        set -euo pipefail
        printf 'module.kafka.client_properties\n' | terraform console > /tmp/client_properties.out

        sed -e '1d' -e '$d' /tmp/client_properties.out > /tmp/client.properties

        grep -q '^bootstrap\.servers=' /tmp/client.properties || { echo 'ERROR: Missing bootstrap.servers'; exit 1; }
        grep -q '^security\.protocol=SASL_SSL$' /tmp/client.properties || { echo 'ERROR: Missing security.protocol=SASL_SSL'; exit 1; }
        grep -q '^sasl\.mechanism=OAUTHBEARER$' /tmp/client.properties || { echo 'ERROR: Expected OAUTHBEARER mechanism'; exit 1; }
        grep -q '^sasl\.oauthbearer\.method=oidc$' /tmp/client.properties || { echo 'ERROR: Missing sasl.oauthbearer.method=oidc'; exit 1; }
        grep -q '^sasl\.oauthbearer\.client\.id=' /tmp/client.properties || { echo 'ERROR: Missing sasl.oauthbearer.client.id'; exit 1; }
        grep -q '^sasl\.oauthbearer\.client\.secret=' /tmp/client.properties || { echo 'ERROR: Missing sasl.oauthbearer.client.secret'; exit 1; }
        grep -q '^sasl\.oauthbearer\.scope=' /tmp/client.properties || { echo 'ERROR: Missing sasl.oauthbearer.scope'; exit 1; }
        grep -q '^sasl\.oauthbearer\.token\.endpoint\.url=' /tmp/client.properties || { echo 'ERROR: Missing oauth token endpoint'; exit 1; }

        if grep -q 'PlainLoginModule' /tmp/client.properties; then
          echo 'ERROR: PlainLoginModule is forbidden in canonical client.properties'
          exit 1
        fi
        if grep -q '\$ConnectionString' /tmp/client.properties; then
          echo 'ERROR: $ConnectionString is forbidden in canonical client.properties'
          exit 1
        fi