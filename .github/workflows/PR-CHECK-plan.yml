name: 'PR Terraform Plan'

on:
  pull_request:
    branches: [ "main" ]

concurrency:
  group: pr-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  terraform-plan:
    name: 'Terraform Plan + OAuth contract'
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 12

    defaults:
      run:
        working-directory: ./terraform

    steps:
    - name: Checkout
      uses: actions/checkout@v3


    - name: Azure Login
      uses: azure/login@v1
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2

    - name: Terraform Init
      run: terraform init -reconfigure -input=false -backend-config="key=tfstate/pr-${{ github.event.pull_request.number }}.tfstate"

    - name: Ensure App Gateway cert secrets exist in Key Vault
      run: |
        set -euo pipefail

        KV_NAME="$(sed -nE 's/^keyvault_name\s*=\s*"([^"]+)"/\1/p' terraform.tfvars | head -n1)"
        if [ -z "$KV_NAME" ]; then
          echo "ERROR: Could not resolve keyvault_name from terraform.tfvars"
          exit 1
        fi

        if ! az keyvault secret show --vault-name "$KV_NAME" --name appgw-pfx-base64 >/dev/null 2>&1; then
          if [ -z "${PFX_BASE64:-}" ] || [ -z "${PFX_PASSWORD:-}" ]; then
            echo "ERROR: Missing Key Vault cert secrets and PFX fallback secrets are not configured"
            exit 1
          fi

          az keyvault secret set --vault-name "$KV_NAME" --name appgw-pfx-base64 --value "$PFX_BASE64" >/dev/null
          az keyvault secret set --vault-name "$KV_NAME" --name appgw-pfx-password --value "$PFX_PASSWORD" >/dev/null
          echo "Seeded missing App Gateway cert secrets in Key Vault"
        else
          echo "App Gateway cert secrets already present in Key Vault"
        fi
      env:
        PFX_BASE64: ${{ secrets.PFX_BASE64 }}
        PFX_PASSWORD: ${{ secrets.PFX_PASSWORD }}

    - name: Release stale PR state lock (best effort)
      run: |
        ACCOUNT_KEY=$(az storage account keys list \
          --account-name tfstate1776442465 \
          --resource-group tfstate-rg \
          --query '[0].value' -o tsv)
        az storage blob lease break \
          --account-name tfstate1776442465 \
          --container-name tfstate \
          --blob-name "tfstate/pr-${{ github.event.pull_request.number }}.tfstate" \
          --account-key "$ACCOUNT_KEY" >/dev/null 2>&1 || true

    - name: Terraform Plan
      timeout-minutes: 5
      run: terraform plan -no-color -input=false -lock-timeout=120s
      env:
        ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        ARM_USE_OIDC: true

    - name: OAuth client.properties contract check
      timeout-minutes: 2
      run: |
        set -euo pipefail
        terraform output -raw client_properties > /tmp/client.properties

        grep -q '^bootstrap\.servers=' /tmp/client.properties || { echo 'ERROR: Missing bootstrap.servers'; exit 1; }
        grep -q '^security\.protocol=SASL_SSL$' /tmp/client.properties || { echo 'ERROR: Missing security.protocol=SASL_SSL'; exit 1; }
        grep -q '^sasl\.mechanism=OAUTHBEARER$' /tmp/client.properties || { echo 'ERROR: Expected OAUTHBEARER mechanism'; exit 1; }
        grep -q '^sasl\.oauthbearer\.method=oidc$' /tmp/client.properties || { echo 'ERROR: Missing sasl.oauthbearer.method=oidc'; exit 1; }
        grep -q '^sasl\.oauthbearer\.client\.id=' /tmp/client.properties || { echo 'ERROR: Missing sasl.oauthbearer.client.id'; exit 1; }
        grep -q '^sasl\.oauthbearer\.client\.secret=' /tmp/client.properties || { echo 'ERROR: Missing sasl.oauthbearer.client.secret'; exit 1; }
        grep -q '^sasl\.oauthbearer\.scope=' /tmp/client.properties || { echo 'ERROR: Missing sasl.oauthbearer.scope'; exit 1; }
        grep -q '^sasl\.oauthbearer\.token\.endpoint\.url=' /tmp/client.properties || { echo 'ERROR: Missing oauth token endpoint'; exit 1; }

        if grep -q 'PlainLoginModule' /tmp/client.properties; then
          echo 'ERROR: PlainLoginModule is forbidden in canonical client.properties'
          exit 1
        fi
        if grep -q '\$ConnectionString' /tmp/client.properties; then
          echo 'ERROR: $ConnectionString is forbidden in canonical client.properties'
          exit 1
        fi
      env:
        ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        ARM_USE_OIDC: true