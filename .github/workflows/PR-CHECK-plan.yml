name: 'PR Terraform Plan'

on:
  pull_request:
    branches: [ "main" ]

concurrency:
  group: pr-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  terraform-plan:
    name: 'Terraform Plan + OAuth contract'
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15

    defaults:
      run:
        working-directory: ./terraform

    steps:
    - name: Checkout
      timeout-minutes: 1
      uses: actions/checkout@v4

    - name: Azure Login
      timeout-minutes: 1
      uses: azure/login@v3
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Setup Terraform
      timeout-minutes: 1
      uses: hashicorp/setup-terraform@v4

    - name: Terraform Init
      timeout-minutes: 3
      run: terraform init -reconfigure -input=false -backend-config="key=tfstate/pr-${{ github.event.pull_request.number }}.tfstate"

    - name: Ensure App Gateway cert secrets exist in Key Vault
      timeout-minutes: 1
      run: |
        set -euo pipefail

        KV_NAME="$(sed -nE 's/^keyvault_name\s*=\s*"([^"]+)"/\1/p' terraform.tfvars | head -n1)"
        if [ -z "$KV_NAME" ]; then
          echo "ERROR: Could not resolve keyvault_name from terraform.tfvars"
          exit 1
        fi

        if ! az keyvault secret show --vault-name "$KV_NAME" --name appgw-pfx-base64 >/dev/null 2>&1; then
          if [ -z "${PFX_BASE64:-}" ] || [ -z "${PFX_PASSWORD:-}" ]; then
            echo "ERROR: Missing Key Vault cert secrets and PFX fallback secrets are not configured"
            exit 1
          fi

          az keyvault secret set --vault-name "$KV_NAME" --name appgw-pfx-base64 --value "$PFX_BASE64" >/dev/null
          az keyvault secret set --vault-name "$KV_NAME" --name appgw-pfx-password --value "$PFX_PASSWORD" >/dev/null
          echo "Seeded missing App Gateway cert secrets in Key Vault"
        else
          echo "App Gateway cert secrets already present in Key Vault"
        fi
      env:
        PFX_BASE64: ${{ secrets.PFX_BASE64 }}
        PFX_PASSWORD: ${{ secrets.PFX_PASSWORD }}

    - name: Release stale PR state lock (best effort)
      timeout-minutes: 1
      run: |
        ACCOUNT_KEY=$(az storage account keys list \
          --account-name tfstate1776442465 \
          --resource-group tfstate-rg \
          --query '[0].value' -o tsv)
        az storage blob lease break \
          --account-name tfstate1776442465 \
          --container-name tfstate \
          --blob-name "tfstate/pr-${{ github.event.pull_request.number }}.tfstate" \
          --account-key "$ACCOUNT_KEY" >/dev/null 2>&1 || true

    - name: Terraform Plan
      timeout-minutes: 5
      run: terraform plan -no-color -input=false -lock-timeout=30s
      env:
        ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        ARM_USE_OIDC: true

    - name: OAuth client.properties contract check (warn only)
      timeout-minutes: 1
      run: |
        set -uo pipefail
        TEMPLATE="../modules/kafka/client-config/main.tf"
        WARN=0

        grep -q 'bootstrap.servers='                   "$TEMPLATE" || { echo 'WARN: Missing bootstrap.servers in client-config template'; WARN=1; }
        grep -q 'security.protocol=SASL_SSL'           "$TEMPLATE" || { echo 'WARN: Missing security.protocol=SASL_SSL in client-config template'; WARN=1; }
        grep -q 'sasl.mechanism=OAUTHBEARER'           "$TEMPLATE" || { echo 'WARN: Expected OAUTHBEARER mechanism in client-config template'; WARN=1; }
        grep -q 'sasl.oauthbearer.method=oidc'         "$TEMPLATE" || { echo 'WARN: Missing sasl.oauthbearer.method=oidc in client-config template'; WARN=1; }
        grep -q 'sasl.oauthbearer.client.id='          "$TEMPLATE" || { echo 'WARN: Missing sasl.oauthbearer.client.id in client-config template'; WARN=1; }
        grep -q 'sasl.oauthbearer.client.secret='      "$TEMPLATE" || { echo 'WARN: Missing sasl.oauthbearer.client.secret in client-config template'; WARN=1; }
        grep -q 'sasl.oauthbearer.scope='              "$TEMPLATE" || { echo 'WARN: Missing sasl.oauthbearer.scope in client-config template'; WARN=1; }
        grep -q 'sasl.oauthbearer.token.endpoint.url=' "$TEMPLATE" || { echo 'WARN: Missing oauth token endpoint in client-config template'; WARN=1; }

        if grep -q 'PlainLoginModule' "$TEMPLATE"; then
          echo 'WARN: PlainLoginModule is forbidden in client-config template'
          WARN=1
        fi
        if grep -q 'ConnectionString' "$TEMPLATE"; then
          echo 'WARN: ConnectionString is forbidden in client-config template'
          WARN=1
        fi

        if [ "$WARN" -eq 1 ]; then
          echo 'OAuth contract check: WARNINGS found (not blocking — fix in a follow-up PR)'
        else
          echo 'OAuth contract check: PASSED'
        fi
        exit 0
