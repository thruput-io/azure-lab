name: 'Schema Tests (Avro + Apicurio Schema Registry)'

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  schema-tests:
    name: 'Schema Tests'
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # ---------------------------------------------------------------
    # Load schema-client.properties
    # ---------------------------------------------------------------
    - name: Load schema-client.properties
      id: creds
      env:
        SCHEMA_CLIENT_PROPERTIES: ${{ secrets.SCHEMA_CLIENT_PROPERTIES }}
      run: |
        set -euo pipefail
        PROPS_FILE="/tmp/schema-client.properties"
        printf '%s' "$SCHEMA_CLIENT_PROPERTIES" > "$PROPS_FILE"
        sed -i 's/\r$//' "$PROPS_FILE"

        if [ ! -s "$PROPS_FILE" ]; then
          echo "ERROR: SCHEMA_CLIENT_PROPERTIES secret is empty — set it in repo Settings → Secrets"
          exit 1
        fi
        
        BOOTSTRAP=$(grep '^bootstrap.servers=' "$PROPS_FILE" | cut -d= -f2-)
        DOMAIN=$(echo "$BOOTSTRAP" | cut -d: -f1)

        echo "domain=$DOMAIN"         >> $GITHUB_OUTPUT
        echo "props_file=$PROPS_FILE" >> $GITHUB_OUTPUT
        echo "Loaded: bootstrap=$BOOTSTRAP"

    # ---------------------------------------------------------------
    # Check 1 — Connectivity + SSL
    # ---------------------------------------------------------------
    - name: 'Check 1 — Connectivity + SSL'
      id: check1
      run: |
        set -euo pipefail
        DOMAIN="${{ steps.creds.outputs.domain }}"

        echo "==> [1a] TLS certificate on ${DOMAIN}:443 ..."
        CERT_RESULT=$(echo | openssl s_client -connect "${DOMAIN}:443" -servername "$DOMAIN" 2>/dev/null)
        if ! echo "$CERT_RESULT" | grep -q "Verify return code: 0 (ok)"; then
          echo "FAIL: TLS certificate verification failed on :443"
          exit 1
        fi
        EXPIRY=$(echo "$CERT_RESULT" | openssl x509 -noout -enddate 2>/dev/null | cut -d= -f2)
        EXPIRY_EPOCH=$(date -d "$EXPIRY" +%s)
        DAYS_LEFT=$(( (EXPIRY_EPOCH - $(date +%s)) / 86400 ))
        echo "  Certificate expires in $DAYS_LEFT days ($EXPIRY)"
        echo "PASS: :443 TLS certificate valid ($DAYS_LEFT days remaining)"

        echo "==> [1b] TLS handshake on ${DOMAIN}:9093 (Kafka) ..."
        if ! echo | openssl s_client -connect "${DOMAIN}:9093" -servername "$DOMAIN" 2>/dev/null \
            | grep -q "Verify return code: 0 (ok)"; then
          echo "FAIL: TLS certificate verification failed on :9093"
          exit 1
        fi
        echo "PASS: :9093 TLS handshake successful"

    # ---------------------------------------------------------------
    # Check 2 — Authentication (OAuth + Kafka)
    # ---------------------------------------------------------------
    - name: 'Check 2 — Authentication (OAuth + Kafka)'
      id: check2
      run: |
        set -euo pipefail
        PROPS_FILE="${{ steps.creds.outputs.props_file }}"

        # Helper to get prop
        get_prop() { grep "^${1}=" "$PROPS_FILE" | head -1 | cut -d= -f2-; }

        TOKEN_ENDPOINT=$(get_prop "oauth.token.endpoint.url")
        CLIENT_ID=$(get_prop "oauth.client.id")
        CLIENT_SECRET=$(get_prop "oauth.client.secret")
        BOOTSTRAP=$(get_prop "bootstrap.servers")
        SCOPE=$(get_prop "oauth.scope")
        if [ -z "$SCOPE" ]; then SCOPE="https://eventhubs.azure.net/.default"; fi

        echo "==> [2a] Fetching OAuth token ..."
        TOKEN_RESP=$(curl -sS --max-time 15 -X POST "$TOKEN_ENDPOINT" \
          -d "grant_type=client_credentials" \
          -d "client_id=$CLIENT_ID" \
          --data-urlencode "client_secret=$CLIENT_SECRET" \
          -d "scope=$SCOPE")
        ACCESS_TOKEN=$(echo "$TOKEN_RESP" | sed -n 's/.*"access_token":[[:space:]]*"\([^"]*\)".*/\1/p' || true)
        if [ -z "$ACCESS_TOKEN" ]; then
          echo "FAIL: Could not obtain OAuth token — response: $TOKEN_RESP"
          exit 1
        fi
        echo "PASS: OAuth token acquired"

        echo "==> [2b] Kafka broker auth via confluentinc/cp-kafka kafka-topics ..."
        docker run --rm \
          -v "$PROPS_FILE:/tmp/client.properties:ro" \
          confluentinc/cp-kafka:8.2.0 \
          kafka-topics \
            --bootstrap-server "$BOOTSTRAP" \
            --command-config /tmp/client.properties \
            --list \
          && echo "PASS: Kafka broker auth OK"

    # ---------------------------------------------------------------
    # Check 3 — Avro Produce + Consume via scripts/schema-check.sh
    # ---------------------------------------------------------------
    - name: 'Check 3 — Avro Produce + Consume (confluentinc/cp-schema-registry)'
      id: check3
      run: |
        set -euo pipefail
        chmod +x scripts/schema-check.sh
        scripts/schema-check.sh --props-file "${{ steps.creds.outputs.props_file }}"

    # ---------------------------------------------------------------
    # Summary
    # ---------------------------------------------------------------
    - name: Summary
      if: always()
      run: |
        printf '%s\n' "### Schema Tests Results" >> $GITHUB_STEP_SUMMARY
        printf '%s\n' "" >> $GITHUB_STEP_SUMMARY
        printf '%s\n' "| # | Check | Target |" >> $GITHUB_STEP_SUMMARY
        printf '%s\n' "|---|---|---|" >> $GITHUB_STEP_SUMMARY
        printf '%s\n' "| 1 | Connectivity + SSL | \`:443\` TLS cert + \`:9093\` TLS handshake |" >> $GITHUB_STEP_SUMMARY
        printf '%s\n' "| 2 | Authentication | OAuth token + Kafka \`kafka-topics\` |" >> $GITHUB_STEP_SUMMARY
        printf '%s\n' "| 3 | Avro Produce + Consume | \`scripts/schema-check.sh\` via \`confluentinc/cp-schema-registry\` |" >> $GITHUB_STEP_SUMMARY
