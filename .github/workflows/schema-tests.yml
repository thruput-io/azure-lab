name: 'Schema Tests (Avro + Azure EH Schema Registry)'

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  schema-tests:
    name: 'Schema Tests'
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: ./terraform

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Azure Login
      uses: azure/login@v3
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_wrapper: false

    - name: Terraform Init
      run: terraform init -input=false
      env:
        ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        ARM_USE_OIDC: true

    - name: Resolve credentials
      id: creds
      run: |
        set -euo pipefail
        BOOTSTRAP=$(terraform output -raw kafka_bootstrap_server)
        DOMAIN=$(echo "$BOOTSTRAP" | cut -d: -f1)
        if [ -z "$DOMAIN" ]; then
          echo "ERROR: Failed to resolve domain from terraform output kafka_bootstrap_server"
          exit 1
        fi
        SR_ENDPOINT=$(terraform output -raw schema_registry_endpoint)
        ORDERS_TOPIC=$(terraform output -raw orders_topic)
        KV_NAME=$(terraform output -raw key_vault_name)
        CLIENT_PROPS=$(az keyvault secret show \
          --vault-name "$KV_NAME" \
          --name kafka-client-properties \
          --query value -o tsv)
        PROPS_FILE="/tmp/client.properties"
        printf '%s\n' "$CLIENT_PROPS" > "$PROPS_FILE"
        sed -i 's/\r$//' "$PROPS_FILE"
        if [ ! -s "$PROPS_FILE" ]; then
          echo "ERROR: Retrieved kafka-client-properties is empty"
          exit 1
        fi
        if ! grep -q '^bootstrap.servers=' "$PROPS_FILE"; then
          echo "ERROR: client.properties is missing bootstrap.servers"
          exit 1
        fi
        echo "domain=$DOMAIN"             >> $GITHUB_OUTPUT
        echo "sr_endpoint=$SR_ENDPOINT"   >> $GITHUB_OUTPUT
        echo "orders_topic=$ORDERS_TOPIC" >> $GITHUB_OUTPUT
        echo "props_file=$PROPS_FILE"     >> $GITHUB_OUTPUT
      env:
        ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        ARM_USE_OIDC: true

    - name: Install Python dependencies
      run: pip install --quiet confluent-kafka azure-schemaregistry azure-schemaregistry-avroencoder azure-identity fastavro
      working-directory: .

    # ---------------------------------------------------------------
    # Check 1 — Connectivity + SSL
    # TLS handshake on :443 (HTTPS), TLS handshake on :9093 (Kafka)
    # ---------------------------------------------------------------
    - name: 'Check 1 — Connectivity + SSL'
      id: check1
      run: |
        set -euo pipefail
        DOMAIN="${{ steps.creds.outputs.domain }}"

        echo "==> [1a] TLS certificate on ${DOMAIN}:443 ..."
        CERT_RESULT=$(echo | openssl s_client -connect "${DOMAIN}:443" -servername "$DOMAIN" 2>/dev/null)
        if ! echo "$CERT_RESULT" | grep -q "Verify return code: 0 (ok)"; then
          echo "FAIL: TLS certificate verification failed on :443"
          exit 1
        fi
        EXPIRY=$(echo "$CERT_RESULT" | openssl x509 -noout -enddate 2>/dev/null | cut -d= -f2)
        EXPIRY_EPOCH=$(date -d "$EXPIRY" +%s 2>/dev/null || date -j -f "%b %d %T %Y %Z" "$EXPIRY" +%s 2>/dev/null)
        DAYS_LEFT=$(( (EXPIRY_EPOCH - $(date +%s)) / 86400 ))
        echo "  Certificate expires in $DAYS_LEFT days ($EXPIRY)"
        if [ "$DAYS_LEFT" -lt 7 ]; then
          echo "FAIL: Certificate expires in $DAYS_LEFT days — renew immediately"
          exit 1
        fi
        echo "PASS: :443 TLS certificate valid, $DAYS_LEFT days remaining"

        echo "==> [1b] TLS handshake on ${DOMAIN}:9093 (Kafka) ..."
        KAFKA_TLS=$(echo | openssl s_client -connect "${DOMAIN}:9093" -servername "$DOMAIN" 2>/dev/null)
        if ! echo "$KAFKA_TLS" | grep -q "Verify return code: 0 (ok)"; then
          echo "FAIL: TLS certificate verification failed on :9093"
          exit 1
        fi
        echo "PASS: :9093 TLS handshake successful"

    # ---------------------------------------------------------------
    # Check 2 — Authentication
    # 2a: Entra ID OAuth token fetch (raw HTTP, proves IdP reachable)
    # 2b: confluent-kafka AdminClient metadata (proves Kafka auth works)
    # 2c: Azure Schema Registry credential (proves SR auth works)
    # ---------------------------------------------------------------
    - name: 'Check 2 — Authentication (OAuth + Kafka + Schema Registry)'
      id: check2
      run: |
        set -euo pipefail
        PROPS_FILE="${{ steps.creds.outputs.props_file }}"
        SR_ENDPOINT="${{ steps.creds.outputs.sr_endpoint }}"

        TOKEN_ENDPOINT=$(grep '^sasl.oauthbearer.token.endpoint.url=' "$PROPS_FILE" | cut -d= -f2-)
        JAAS=$(grep '^sasl.jaas.config=' "$PROPS_FILE" | cut -d= -f2-)
        CLIENT_ID=$(echo "$JAAS" | grep -oP 'clientId="\K[^"]+')
        CLIENT_SECRET=$(echo "$JAAS" | grep -oP 'clientSecret="\K[^"]+')

        echo "==> [2a] Fetching Entra ID OAuth token ..."
        TOKEN_RESP=$(curl -sS --max-time 15 -X POST "$TOKEN_ENDPOINT" \
          -d "grant_type=client_credentials" \
          -d "client_id=$CLIENT_ID" \
          --data-urlencode "client_secret=$CLIENT_SECRET" \
          -d "scope=https://eventhubs.azure.net/.default")
        ACCESS_TOKEN=$(echo "$TOKEN_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token',''))")
        if [ -z "$ACCESS_TOKEN" ]; then
          echo "FAIL: Could not obtain OAuth token — response: $TOKEN_RESP"
          exit 1
        fi
        echo "PASS: OAuth token acquired"

        echo "==> [2b] Kafka broker auth via confluent-kafka AdminClient ..."
        python3 << PYEOF
        import sys
        from confluent_kafka.admin import AdminClient

        with open("$PROPS_FILE") as f:
            props = {}
            for line in f:
                line = line.strip()
                if line and not line.startswith("#") and "=" in line:
                    k, _, v = line.partition("=")
                    props[k.strip()] = v.strip()

        import re
        jaas = props["sasl.jaas.config"]
        client_id     = re.search(r'clientId="([^"]+)"',     jaas).group(1)
        client_secret = re.search(r'clientSecret="([^"]+)"', jaas).group(1)

        conf = {
            "bootstrap.servers":                   props["bootstrap.servers"],
            "security.protocol":                   "SASL_SSL",
            "sasl.mechanisms":                     "OAUTHBEARER",
            "sasl.oauthbearer.method":             "oidc",
            "sasl.oauthbearer.token.endpoint.url": props["sasl.oauthbearer.token.endpoint.url"],
            "sasl.oauthbearer.client.id":          client_id,
            "sasl.oauthbearer.client.secret":      client_secret,
            "sasl.oauthbearer.scope":              "https://eventhubs.azure.net/.default",
            "enable.ssl.certificate.verification": "true",
        }
        admin = AdminClient(conf)
        md = admin.list_topics(timeout=20)
        print(f"PASS: Kafka auth OK — broker={md.orig_broker_name}, topics={len(md.topics)}")
        PYEOF

        echo "==> [2c] Azure Schema Registry credential check ..."
        python3 << PYEOF
        import re, sys
        from azure.identity import ClientSecretCredential
        from azure.schemaregistry import SchemaRegistryClient

        with open("$PROPS_FILE") as f:
            props = {}
            for line in f:
                line = line.strip()
                if line and not line.startswith("#") and "=" in line:
                    k, _, v = line.partition("=")
                    props[k.strip()] = v.strip()

        jaas = props["sasl.jaas.config"]
        client_id     = re.search(r'clientId="([^"]+)"',     jaas).group(1)
        client_secret = re.search(r'clientSecret="([^"]+)"', jaas).group(1)
        tenant_id     = re.search(r'/([^/]+)/oauth2', props["sasl.oauthbearer.token.endpoint.url"]).group(1)
        sr_ns         = "$SR_ENDPOINT".removeprefix("https://")

        credential = ClientSecretCredential(tenant_id=tenant_id, client_id=client_id, client_secret=client_secret)
        sr_client  = SchemaRegistryClient(fully_qualified_namespace=sr_ns, credential=credential)
        schemas = list(sr_client.list_schema_groups())
        print(f"PASS: Schema Registry auth OK — groups={schemas}")
        PYEOF
      working-directory: .

    # ---------------------------------------------------------------
    # Check 3 — Avro Produce + Consume
    # Register schema, encode + produce, consume + decode
    # All using official Confluent libs + Azure SR
    # ---------------------------------------------------------------
    - name: 'Check 3 — Avro Produce + Consume'
      id: check3
      run: |
        set -euo pipefail
        python3 << 'PYEOF'
        import os, sys, time, json, re

        props_file  = os.environ["PROPS_FILE"]
        topic       = os.environ["ORDERS_TOPIC"]
        sr_endpoint = os.environ["SR_ENDPOINT"]
        schema_group = "orders-schema-group"

        # Parse client.properties
        props = {}
        with open(props_file) as f:
            for line in f:
                line = line.strip()
                if line and not line.startswith("#") and "=" in line:
                    k, _, v = line.partition("=")
                    props[k.strip()] = v.strip()

        jaas          = props["sasl.jaas.config"]
        client_id     = re.search(r'clientId="([^"]+)"',     jaas).group(1)
        client_secret = re.search(r'clientSecret="([^"]+)"', jaas).group(1)
        tenant_id     = re.search(r'/([^/]+)/oauth2', props["sasl.oauthbearer.token.endpoint.url"]).group(1)

        print(f"bootstrap  : {props['bootstrap.servers']}")
        print(f"sr_endpoint: {sr_endpoint}")
        print(f"topic      : {topic}")

        # ── Avro schema ─────────────────────────────────────────────
        SCHEMA_NAME = "OrderPlaced"
        SCHEMA_DEF  = json.dumps({
            "type": "record", "name": "OrderPlaced", "namespace": "io.thruput.orders",
            "fields": [
                {"name": "order_id",  "type": "string"},
                {"name": "product",   "type": "string"},
                {"name": "quantity",  "type": "int"},
                {"name": "timestamp", "type": "long"}
            ]
        })

        # ── Azure Schema Registry (official azure-schemaregistry lib) ─
        from azure.identity import ClientSecretCredential
        from azure.schemaregistry import SchemaRegistryClient
        from azure.schemaregistry.encoder.avroencoder import AvroEncoder

        credential = ClientSecretCredential(tenant_id=tenant_id, client_id=client_id, client_secret=client_secret)
        sr_client  = SchemaRegistryClient(fully_qualified_namespace=sr_endpoint.removeprefix("https://"), credential=credential)

        print(f"==> Registering schema '{SCHEMA_NAME}' in '{schema_group}' ...")
        schema_props = sr_client.register_schema(group_name=schema_group, name=SCHEMA_NAME, definition=SCHEMA_DEF, format="Avro")
        print(f"PASS: Schema registered — id={schema_props.id}")

        encoder = AvroEncoder(client=sr_client, group_name=schema_group, auto_register=True)

        # ── Kafka config (official confluent-kafka / librdkafka keys) ─
        kafka_conf = {
            "bootstrap.servers":                   props["bootstrap.servers"],
            "security.protocol":                   "SASL_SSL",
            "sasl.mechanisms":                     "OAUTHBEARER",
            "sasl.oauthbearer.method":             "oidc",
            "sasl.oauthbearer.token.endpoint.url": props["sasl.oauthbearer.token.endpoint.url"],
            "sasl.oauthbearer.client.id":          client_id,
            "sasl.oauthbearer.client.secret":      client_secret,
            "sasl.oauthbearer.scope":              "https://eventhubs.azure.net/.default",
            "enable.ssl.certificate.verification": True,
        }

        # ── Produce ──────────────────────────────────────────────────
        from confluent_kafka import Producer, Consumer, KafkaException, KafkaError

        payload = {"order_id": "avro-full-test-001", "product": "test-widget", "quantity": 1, "timestamp": int(time.time() * 1000)}
        encoded_bytes = bytes(encoder.encode(payload, schema_format="Avro"))

        producer  = Producer(kafka_conf)
        delivered = {"ok": False, "err": None}
        def on_delivery(err, msg):
            if err:
                delivered["err"] = err
            else:
                delivered["ok"] = True
                print(f"PASS: Produced to {msg.topic()} partition={msg.partition()} offset={msg.offset()}")

        print(f"==> Producing Avro message to '{topic}' ...")
        producer.produce(topic, value=encoded_bytes, callback=on_delivery)
        producer.flush(timeout=30)
        if not delivered["ok"]:
            print(f"FAIL: Delivery failed — {delivered['err']}")
            sys.exit(1)

        # ── Consume ──────────────────────────────────────────────────
        consumer_conf = {
            **kafka_conf,
            "group.id":           f"avro-full-test-{int(time.time())}",
            "auto.offset.reset":  "latest",
            "session.timeout.ms": 30000,
        }
        consumer = Consumer(consumer_conf)
        consumer.subscribe([topic])
        print(f"==> Consuming Avro message from '{topic}' (timeout 45s) ...")
        deadline, consumed = time.time() + 45, None
        while time.time() < deadline:
            msg = consumer.poll(2.0)
            if msg is None:
                continue
            if msg.error():
                if msg.error().code() == KafkaError._PARTITION_EOF:
                    continue
                raise KafkaException(msg.error())
            consumed = msg
            break
        consumer.close()
        if consumed is None:
            print(f"FAIL: No message consumed from '{topic}' within timeout")
            sys.exit(1)

        # ── Decode ───────────────────────────────────────────────────
        decoded = encoder.decode(consumed.value())
        print(f"Decoded  : {decoded}")
        print(f"PASS: Avro produce + consume round-trip successful on '{topic}'")
        PYEOF
      env:
        PROPS_FILE:   ${{ steps.creds.outputs.props_file }}
        ORDERS_TOPIC: ${{ steps.creds.outputs.orders_topic }}
        SR_ENDPOINT:  ${{ steps.creds.outputs.sr_endpoint }}
      working-directory: .

    # ---------------------------------------------------------------
    # Summary
    # ---------------------------------------------------------------
    - name: Summary
      if: always()
      run: |
        printf '%s\n' "### Avro Full Test Results" >> $GITHUB_STEP_SUMMARY
        printf '%s\n' "" >> $GITHUB_STEP_SUMMARY
        printf '%s\n' "| # | Check | Target |" >> $GITHUB_STEP_SUMMARY
        printf '%s\n' "|---|---|---|" >> $GITHUB_STEP_SUMMARY
        printf '%s\n' "| 1 | Connectivity + SSL | \`:443\` TLS cert + \`:9093\` TLS handshake |" >> $GITHUB_STEP_SUMMARY
        printf '%s\n' "| 2 | Authentication | OAuth token + Kafka AdminClient + Schema Registry credential |" >> $GITHUB_STEP_SUMMARY
        printf '%s\n' "| 3 | Avro Produce + Consume | topic \`${{ steps.creds.outputs.orders_topic }}\` via \`${{ steps.creds.outputs.domain }}:9093\` |" >> $GITHUB_STEP_SUMMARY
      working-directory: .
