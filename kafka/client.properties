# ============================================================
# Kafka Client Configuration for Azure Event Hub via App Gateway
# Replace placeholders with values from Terraform outputs after deployment:
#
#   terraform output kafka_client_id        -> <CLIENT_ID>
#   terraform output -raw kafka_client_secret -> <CLIENT_SECRET>
#   terraform output kafka_bootstrap_server -> eventhub.thruput.se:9093
#   terraform output schema_registry_url   -> https://eventhub.thruput.se
#
# Retrieve TENANT_ID from Azure Portal or:
#   az account show --query tenantId -o tsv
# ============================================================

# Bootstrap server (Application Gateway public endpoint)
bootstrap.servers=eventhub.thruput.se:9093

# Security
security.protocol=SASL_SSL
sasl.mechanism=OAUTHBEARER
sasl.login.callback.handler.class=org.apache.kafka.common.security.oauthbearer.secured.OAuthBearerLoginCallbackHandler

# OAuth2 token endpoint (Azure AD)
sasl.oauthbearer.token.endpoint.url=https://login.microsoftonline.com/<TENANT_ID>/oauth2/v2.0/token

# JAAS config — App Registration credentials
sasl.jaas.config=org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginModule required \
  clientId="<CLIENT_ID>" \
  clientSecret="<CLIENT_SECRET>" \
  scope="https://eventhubs.azure.net/.default";

# ============================================================
# Schema Registry (Azure Event Hub Schema Registry via App Gateway)
# ============================================================
schema.registry.url=https://eventhub.thruput.se
basic.auth.credentials.source=USER_INFO
schema.registry.basic.auth.user.info=<CLIENT_ID>:<CLIENT_SECRET>

# Avro serialization (TopicNameStrategy — default)
value.serializer=io.confluent.kafka.serializers.KafkaAvroSerializer
value.deserializer=io.confluent.kafka.serializers.KafkaAvroDeserializer
specific.avro.reader=true
