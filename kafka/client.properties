# ============================================================
# Kafka Client Configuration for Azure Event Hub via App Gateway
# Download the populated version via GitHub Actions:
#   Actions -> Download client.properties -> Run workflow
# ============================================================

# Kafka broker — via Application Gateway (public endpoint, port 9093)
bootstrap.servers=<CUSTOM_DOMAIN_NAME>:9093
security.protocol=SASL_SSL
sasl.mechanism=OAUTHBEARER
sasl.login.callback.handler.class=org.apache.kafka.common.security.oauthbearer.secured.OAuthBearerLoginCallbackHandler
sasl.oauthbearer.token.endpoint.url=https://login.microsoftonline.com/<TENANT_ID>/oauth2/v2.0/token
sasl.jaas.config=org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginModule required \
  clientId="<CLIENT_ID>" \
  clientSecret="<CLIENT_SECRET>" \
  scope="https://eventhubs.azure.net/.default";

# Topics
topic=orders.placed
checks_topic=checks.kafka

# Test credentials (SASL/PLAIN $ConnectionString for cp-kafka compatibility tests)
# Used by kafka-check.sh — not for production client use
sasl.connection.string=<EH_NAMESPACE_PRIMARY_CONNECTION_STRING>
