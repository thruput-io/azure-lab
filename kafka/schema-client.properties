# ============================================================
# Schema Registry Client Configuration (Confluent-compatible)
# Download the populated version via GitHub Actions:
#   Actions -> Download client.properties -> Run workflow
# ============================================================

# Kafka broker (needed by Avro producer/consumer)
bootstrap.servers=<CUSTOM_DOMAIN_NAME>:9093
security.protocol=SASL_SSL
sasl.mechanism=PLAIN
sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="\$ConnectionString" password="<EH_NAMESPACE_PRIMARY_CONNECTION_STRING>";

# Schema Registry URL (Azure EH Schema Registry via App Gateway)
schema.registry.url=https://<CUSTOM_DOMAIN_NAME>

# OAuth credentials (used by client to get token for Azure SR)
sasl.oauthbearer.token.endpoint.url=https://login.microsoftonline.com/<TENANT_ID>/oauth2/v2.0/token
sasl.jaas.config=org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginModule required \
  clientId="<CLIENT_ID>" \
  clientSecret="<CLIENT_SECRET>" \
  scope="https://eventhubs.azure.net/.default";
